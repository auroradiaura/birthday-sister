<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 23rd Birthday Sister</title>
<style>
body{
  margin:0;
  background:#000;
  overflow:hidden;
  font-family:Arial, sans-serif;
  text-align:center;
  color:white;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:1;
}

#count{
  position:absolute;
  top:40%;
  width:100%;
  font-size:80px;
  font-weight:bold;
  z-index:2;
}

#message{
  position:absolute;
  top:15%;
  width:100%;
  font-size:40px;
  display:none;
  color:white;
  text-shadow:0 0 20px #fff;
  font-weight:bold;
  z-index:2;
}

#typing{
  font-size:18px;
  color:#ffd1dc;
  display:block;
  margin-top:20px;
  line-height:1.6;
  max-width:90%;
  margin-left:auto;
  margin-right:auto;
  z-index:2;
}

#iloveyou{
  position:absolute;
  top:50%;
  left:50%;
  font-size:40px;
  font-weight:bold;
  color:red;
  transform:translate(-50%,-50%);
  display:none;
  z-index:2;
}
</style>
</head>

<body>

<div id="count">1</div>

<div id="message">
  Happy 23rd Birthday Sister ❤️
  <br><br>
  <span id="typing"></span>
</div>

<div id="iloveyou">I love you</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ------------------------ Countdown ------------------------
let count = 1;
const countDiv = document.getElementById("count");
let timer = setInterval(()=>{
  count++;
  countDiv.innerText = count;
  if(count > 3){
    clearInterval(timer);
    countDiv.style.display = "none";
    showBirthday();
  }
},1000);

// ------------------------ Heart-shaped "I love you" ------------------------
let iloveDiv = document.getElementById("iloveyou");
let t = 0;
function animateILoveHeart(){
  t += 0.02;
  let x = 16*Math.pow(Math.sin(t),3);
  let y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));
  iloveDiv.style.left = canvas.width/2 + x*20 + "px";
  iloveDiv.style.top = canvas.height/2 + y*20 + "px";
  requestAnimationFrame(animateILoveHeart);
}

// ------------------------ Confetti ------------------------
let confettiParticles = [];
function createConfetti(){
  for(let i=0;i<150;i++){
    confettiParticles.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height - canvas.height,
      r: Math.random()*6 + 4,
      d: Math.random()*10 + 2,
      color: `hsl(${Math.random()*360},100%,50%)`,
      tilt: Math.random()*10 - 5
    });
  }
}
function drawConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  confettiParticles.forEach(p=>{
    ctx.beginPath();
    ctx.fillStyle = p.color;
    ctx.moveTo(p.x + p.tilt, p.y);
    ctx.lineTo(p.x + p.tilt + p.r/2, p.y + p.r);
    ctx.lineTo(p.x + p.tilt - p.r/2, p.y + p.r);
    ctx.closePath();
    ctx.fill();
    p.y += 2;
    p.x += Math.sin(p.y * 0.05);
    if(p.y > canvas.height){ p.y = -10; p.x = Math.random()*canvas.width; }
  });
  requestAnimationFrame(drawConfetti);
}

// ------------------------ Typing personal message ------------------------
const text = "Thank you for always being there for me.\nYou are not just my sister, you are my best friend.\nHappy 23rd Birthday ❤️";
let i=0;
const typingDiv = document.getElementById("typing");
function typeMessage(){
  if(i<text.length){
    typingDiv.innerHTML += text.charAt(i)==="\n"? "<br>":text.charAt(i);
    i++;
    setTimeout(typeMessage,40);
  }
}

// ------------------------ Canvas cake ------------------------
function drawCake(){
  const cakeX = canvas.width/2;
  const cakeY = canvas.height*0.75;
  const cakeWidth = 120;
  const cakeHeight = 80;

  // Base layer
  ctx.fillStyle="#ff4d6d";
  ctx.fillRect(cakeX-cakeWidth/2, cakeY-cakeHeight, cakeWidth, cakeHeight);

  // Frosting layer
  ctx.fillStyle="#fff";
  ctx.fillRect(cakeX-cakeWidth/2, cakeY-cakeHeight-20, cakeWidth, 20);

  // Heart on top
  ctx.font="30px Arial";
  ctx.fillStyle="red";
  ctx.fillText("❤",cakeX-10,cakeY-cakeHeight-5);

  requestAnimationFrame(drawCake);
}

// ------------------------ Show birthday elements ------------------------
function showBirthday(){
  document.getElementById("message").style.display="block";
  document.getElementById("iloveyou").style.display="block";
  animateILoveHeart();
  createConfetti();
  drawConfetti();
  drawCake();
  typeMessage();
}
</script>

</body>
  </html>
