here<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 23rd Birthday Sister</title>
<style>
body{
  margin:0;
  background:#000;
  overflow:hidden;
  font-family:Arial, sans-serif;
  text-align:center;
  color:white;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:1;
}

#count{
  position:absolute;
  top:40%;
  width:100%;
  font-size:80px;
  font-weight:bold;
  z-index:2;
}

#birthday{
  position:absolute;
  top:15%;
  width:100%;
  font-size:50px;
  font-weight:bold;
  display:none;
  color:white;
  text-shadow:0 0 20px #fff;
  z-index:2;
}

#iloveyou{
  position:absolute;
  top:50%;
  width:100%;
  font-size:40px;
  font-weight:bold;
  color:red;
  transform:translateY(-50%);
  z-index:2;
}
</style>
</head>
<body>

<div id="count">1</div>
<div id="birthday">Happy 23rd Birthday Sister ❤️</div>
<div id="iloveyou">I love you</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ------------------------ Countdown ------------------------
let count = 1;
const countDiv = document.getElementById("count");
let timer = setInterval(()=>{
  count++;
  countDiv.innerText = count;
  if(count > 3){
    clearInterval(timer);
    countDiv.style.display = "none";
    showBirthday();
  }
}, 1000);

// ------------------------ Heart “I love you” animation ------------------------
let iloveDiv = document.getElementById("iloveyou");
let iloveY = canvas.height / 2;
let direction = 1;

function animateILoveYou(){
  iloveY += direction * 0.8; // slow up and down movement
  if(iloveY > window.innerHeight/2 + 20 || iloveY < window.innerHeight/2 - 20){
    direction *= -1;
  }
  iloveDiv.style.top = iloveY + "px";
  requestAnimationFrame(animateILoveYou);
}

// ------------------------ Confetti ------------------------
let confettiParticles = [];

function createConfetti(){
  for(let i=0;i<150;i++){
    confettiParticles.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height - canvas.height,
      r: Math.random()*6 + 4,
      d: Math.random()*10 + 2,
      color: `hsl(${Math.random()*360},100%,50%)`,
      tilt: Math.random()*10 - 5
    });
  }
}

function drawConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  confettiParticles.forEach(p=>{
    ctx.beginPath();
    ctx.fillStyle = p.color;
    ctx.moveTo(p.x + p.tilt, p.y);
    ctx.lineTo(p.x + p.tilt + p.r/2, p.y + p.r);
    ctx.lineTo(p.x + p.tilt - p.r/2, p.y + p.r);
    ctx.closePath();
    ctx.fill();

    p.y += 2;
    p.x += Math.sin(p.y * 0.05);
    if(p.y > canvas.height){ p.y = -10; p.x = Math.random()*canvas.width; }
  });
  requestAnimationFrame(drawConfetti);
}

// ------------------------ Show birthday elements ------------------------
function showBirthday(){
  document.getElementById("birthday").style.display = "block";
  iloveDiv.style.display = "block";
  animateILoveYou();
  createConfetti();
  drawConfetti();
}
</script>

</body>
  </html>
