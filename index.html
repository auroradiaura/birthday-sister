<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 23rd Birthday Sister</title>

<style>
body{
  margin:0;
  background:#000;
  overflow:hidden;
  font-family:Arial, sans-serif;
  text-align:center;
  color:white;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:1;
}

#count{
  position:absolute;
  top:40%;
  width:100%;
  font-size:80px;
  font-weight:bold;
  z-index:2;
}

#message{
  position:absolute;
  top:15%;
  width:100%;
  font-size:30px;
  display:none;
  color:#ff4d6d;
  text-shadow:0 0 20px #ff4d6d;
  z-index:2;
}

#typing{
  font-size:18px;
  color:#ffd1dc;
  display:block;
  margin-top:20px;
  line-height:1.6;
  max-width:90%;
  margin-left:auto;
  margin-right:auto;
}

#cake{
  position:absolute;
  bottom:12%;
  width:100%;
  font-size:90px;
  display:none;
  z-index:2;
}
</style>
</head>

<body>

<div id="count">1</div>

<div id="message">
Happy 23rd Birthday Sister ❤️
<br><br>
<span id="typing"></span>
</div>

<div id="cake">🎂</div>

<canvas id="canvas"></canvas>

<!-- Birthday music -->
<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const music = document.getElementById("music");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ------------------------ Heart + Glowing Particles ------------------------
let particles = [];
let sparkles = [];
let heartVisible = false;

function heart(t){
  return { x:16*Math.pow(Math.sin(t),3), y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)) };
}

function initHeart() {
  particles = [];
  sparkles = [];
  for(let i=0;i<180;i++){
    let t=Math.random()*Math.PI*2;
    particles.push({ angle:t, speed:0.005 + Math.random()*0.01, size:12 + Math.random()*10 });
  }
}

function drawHeart(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(heartVisible){
    particles.forEach(p=>{
      p.angle += p.speed;
      let pos = heart(p.angle);
      let x = canvas.width/2 + pos.x*16;
      let y = canvas.height/2 + pos.y*16;
      ctx.fillStyle = "red";
      ctx.font = p.size+"px Arial";
      ctx.fillText("I love you", x, y);

      for(let s=0;s<2;s++){
        sparkles.push({ x:x+(Math.random()-0.5)*20, y:y+(Math.random()-0.5)*20, alpha:Math.random(), size:Math.random()*3+1 });
      }
    });

    for(let i=sparkles.length-1;i>=0;i--){
      let sp = sparkles[i];
      ctx.fillStyle = `rgba(255,200,255,${sp.alpha})`;
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, sp.size,0,Math.PI*2);
      ctx.fill();
      sp.alpha -= 0.02;
      if(sp.alpha<=0) sparkles.splice(i,1);
    }
  }
  requestAnimationFrame(drawHeart);
}

initHeart();
drawHeart();

// ------------------------ Confetti ------------------------
function confettiBurst(){
  for(let i=0;i<120;i++){
    let x=Math.random()*canvas.width;
    let y=Math.random()*canvas.height;
    ctx.fillStyle=`hsl(${Math.random()*360},100%,50%)`;
    ctx.fillRect(x,y,6,6);
  }
}
setInterval(()=>{ if(heartVisible) confettiBurst(); },500);
document.addEventListener("click",()=>{ if(heartVisible) confettiBurst(); });

// ------------------------ Countdown ------------------------
let count = 1;
const countDiv = document.getElementById("count");
let timer = setInterval(()=>{
  count++;
  countDiv.innerText = count;
  if(count > 3){
    clearInterval(timer);
    countDiv.style.display = "none";
    showBirthday();
  }
}, 1000);

// ------------------------ Typing message ------------------------
const text = "Thank you for always being there for me.\nYou are not just my sister, you are my best friend.\nHappy 23rd Birthday ❤️";
let i=0;
function typeMessage(){
  if(i<text.length){
    document.getElementById("typing").innerHTML += text.charAt(i)==="\n"?"<br>":text.charAt(i);
    i++;
    setTimeout(typeMessage, 40);
  }
}

// ------------------------ Show everything + autoplay music ------------------------
function showBirthday(){
  heartVisible = true;
  document.getElementById("message").style.display = "block";
  document.getElementById("cake").style.display = "block";
  typeMessage();

  // Autoplay music (mobile-friendly hack)
  const playMusic = () => { music.play().catch(()=>{}); document.body.removeEventListener("touchstart", playMusic); };
  music.play().catch(()=>{}); // try autoplay
  document.body.addEventListener("touchstart", playMusic, { once:true });
  document.body.addEventListener("click", playMusic, { once:true });
}

</script>

</body>
</html>
