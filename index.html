<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Happy 23rd Birthday Dot</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #000;
  overflow: hidden;
  font-family: Arial, sans-serif;
  text-align: center;
  color: white;
  min-height: 100vh;
  min-height: -webkit-fill-available;
}

canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 1;
}

#count {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: clamp(60px, 20vw, 120px);
  font-weight: bold;
  z-index: 2;
  text-shadow: 0 0 40px rgba(140,170,255,0.8);
}

/* ── MESSAGE WRAPPER ── */
#message {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 92%;
  max-width: 560px;
  max-height: 88vh;
  overflow-y: auto;
  display: none;
  z-index: 2;
  transition: opacity 1.5s ease, transform 1.5s ease;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
#message::-webkit-scrollbar { display: none; }

/* ── MIDNIGHT BLUE SILVER CARD ── */
#card {
  width: 100%;
  background: linear-gradient(145deg, #0a0e2a 0%, #0d1540 40%, #111a4a 70%, #0a0e2a 100%);
  border: 1px solid rgba(180,200,255,0.25);
  border-radius: 20px;
  padding: clamp(20px,5vw,36px) clamp(18px,5vw,34px);
  box-shadow:
    0 0 0 1px rgba(140,170,255,0.12),
    0 0 40px rgba(80,120,255,0.18),
    0 8px 40px rgba(0,0,10,0.7),
    inset 0 1px 0 rgba(200,220,255,0.12);
  position: relative;
  overflow: visible;
  text-align: center;
}

/* Silver shimmer top edge */
#card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(to right,
    transparent,
    rgba(180,200,255,0.2) 20%,
    rgba(220,235,255,0.9) 50%,
    rgba(180,200,255,0.2) 80%,
    transparent
  );
}

/* Subtle blue glow corner */
#card::after {
  content: '';
  position: absolute;
  top: -50px; right: -50px;
  width: 140px; height: 140px;
  background: radial-gradient(circle, rgba(80,120,255,0.10) 0%, transparent 70%);
  pointer-events: none;
}

/* ── HEADING inside card ── */
#card-heading {
  font-size: clamp(18px, 5vw, 30px);
  font-weight: bold;
  color: #fff;
  text-shadow:
    0 0 20px rgba(180,210,255,0.9),
    0 0 40px rgba(100,140,255,0.5);
  margin-bottom: 16px;
  letter-spacing: 0.5px;
  line-height: 1.3;
}

/* ── TYPING TEXT ── */
#typing {
  font-size: clamp(13px, 2.6vw, 16px);
  color: #c8d8ff;
  display: block;
  line-height: 1.85;
  width: 100%;
  word-wrap: break-word;
  text-align: left;
  font-family: Georgia, serif;
  font-style: italic;
  letter-spacing: 0.3px;
  text-shadow: 0 0 12px rgba(140,170,255,0.35);
}
  width: 100%;
  height: 1px;
  background: linear-gradient(to right,
    transparent,
    rgba(180,210,255,0.5) 20%,
    rgba(220,235,255,0.95) 50%,
    rgba(180,210,255,0.5) 80%,
    transparent
  );
  margin: 14px 0;
}

/* ── SECRET LOCK SCREEN ── */
#lock-screen {
  position: fixed;
  inset: 0;
  z-index: 3000;
  background: radial-gradient(ellipse at 50% 40%, #0a0e2a 0%, #05081a 60%, #000 100%);
  transition: opacity 1s ease;
  overflow: hidden;
}
#lock-screen.hide { opacity: 0; pointer-events: none; }

/* Particles fill the entire screen */
#lock-particles {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

/* Content wrapper — centered over the canvas */
#lock-content {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 90%;
  max-width: 400px;
  gap: 0;
  padding: 20px;
  box-sizing: border-box;
}

/* Lock icon */
#lock-icon {
  font-size: clamp(52px, 15vw, 88px);
  margin-bottom: clamp(8px,2vh,14px);
  animation: lockPulse 2s ease-in-out infinite;
  filter: drop-shadow(0 0 18px rgba(140,170,255,0.7));
  text-align: center;
  line-height: 1;
  display: block;
  width: 100%;
}
@keyframes lockPulse {
  0%,100% { transform: scale(1);    filter: drop-shadow(0 0 14px rgba(140,170,255,0.6)); }
  50%      { transform: scale(1.08); filter: drop-shadow(0 0 28px rgba(140,200,255,0.9)); }
}

/* Hint text */
#lock-hint {
  font-size: clamp(13px, 3.5vw, 18px);
  color: rgba(180,210,255,0.7);
  letter-spacing: 2px;
  margin-bottom: 6px;
  font-style: italic;
  text-align: center;
}

/* Clue text */
#lock-clue {
  font-size: clamp(11px, 2.8vw, 14px);
  color: rgba(140,170,255,0.5);
  letter-spacing: 1px;
  margin-bottom: clamp(18px,3vh,28px);
  font-style: italic;
  text-align: center;
}

/* Input wrapper */
#lock-input-wrap {
  position: relative;
  width: min(300px, 80vw);
  display: flex;
  flex-direction: column;
  align-items: center;
}

#lock-input {
  width: 100%;
  padding: 14px 20px;
  font-size: clamp(15px, 4vw, 18px);
  background: rgba(10,14,42,0.9);
  border: 1px solid rgba(140,170,255,0.35);
  border-radius: 12px;
  color: #c8d8ff;
  text-align: center;
  letter-spacing: 3px;
  outline: none;
  box-shadow: 0 0 20px rgba(80,120,255,0.15), inset 0 1px 0 rgba(200,220,255,0.08);
  transition: border-color .3s, box-shadow .3s;
  -webkit-appearance: none;
}
#lock-input:focus {
  border-color: rgba(140,180,255,0.7);
  box-shadow: 0 0 30px rgba(80,120,255,0.3), inset 0 1px 0 rgba(200,220,255,0.1);
}
#lock-input::placeholder {
  color: rgba(140,170,255,0.35);
  letter-spacing: 1px;
}

/* Submit button */
#lock-btn {
  margin-top: 14px;
  width: 100%;
  padding: 13px;
  font-size: clamp(14px, 3.5vw, 16px);
  background: linear-gradient(135deg, #0d1540, #1a2a6e);
  border: 1px solid rgba(140,170,255,0.4);
  border-radius: 12px;
  color: #c8d8ff;
  letter-spacing: 2px;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(80,120,255,0.2);
  transition: background .3s, box-shadow .3s, transform .15s;
  -webkit-appearance: none;
}
#lock-btn:hover, #lock-btn:active {
  background: linear-gradient(135deg, #111a4a, #223080);
  box-shadow: 0 0 35px rgba(80,140,255,0.4);
  transform: scale(1.02);
}

/* Error shake */
#lock-error {
  margin-top: 12px;
  font-size: clamp(12px, 3vw, 14px);
  color: #ff6b8a;
  letter-spacing: 1px;
  min-height: 20px;
  text-shadow: 0 0 10px rgba(255,100,130,0.5);
  opacity: 0;
  transition: opacity .3s;
}
#lock-error.show { opacity: 1; }

@keyframes shake {
  0%,100%{ transform: translateX(0); }
  20%    { transform: translateX(-8px); }
  40%    { transform: translateX(8px); }
  60%    { transform: translateX(-6px); }
  80%    { transform: translateX(6px); }
}
.shake { animation: shake .4s ease; }

/* Unlock success flash */
#lock-success {
  position: absolute;
  font-size: clamp(18px, 5vw, 26px);
  color: #c8d8ff;
  letter-spacing: 4px;
  opacity: 0;
  transition: opacity .5s;
  text-shadow: 0 0 20px rgba(140,180,255,0.9);
}
#lock-success.show { opacity: 1; }

/* Floating silver particles on lock screen */
#lock-particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* ── POST-UNLOCK COUNTDOWN OVERLAY ── */
#countdown-overlay {
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: #000;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 6px;
  transition: opacity 1s ease;
  overflow: hidden;
}
#countdown-overlay.show { display: flex; }
#countdown-overlay.hide { opacity: 0; pointer-events: none; }

/* Ocean canvas behind everything */
#ocean-canvas {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}

#cd-number {
  position: relative; z-index: 1;
  font-family: Georgia, serif;
  font-size: clamp(80px, 28vw, 160px);
  font-weight: bold;
  line-height: 1;
  /* Deep ocean silver-blue shimmer */
  background: linear-gradient(
    160deg,
    #4a6fa5 0%,
    #6e9fcc 20%,
    #a8d4f0 40%,
    #e8f4ff 50%,
    #a8d4f0 60%,
    #6e9fcc 80%,
    #4a6fa5 100%
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 25px rgba(100,180,255,0.9))
          drop-shadow(0 0 55px rgba(50,120,200,0.6))
          drop-shadow(0 0 90px rgba(20,60,140,0.4));
  animation: oceanShimmer 2.5s ease-in-out infinite;
}
@keyframes oceanShimmer {
  0%,100% {
    filter: drop-shadow(0 0 20px rgba(100,180,255,0.8))
            drop-shadow(0 0 50px rgba(50,120,200,0.5))
            drop-shadow(0 0 80px rgba(20,60,140,0.3));
  }
  50% {
    filter: drop-shadow(0 0 35px rgba(140,210,255,1.0))
            drop-shadow(0 0 70px rgba(80,160,240,0.75))
            drop-shadow(0 0 110px rgba(40,90,180,0.5));
  }
}

#cd-number.pop {
  animation: cdPop .55s cubic-bezier(.22,.8,.36,1), oceanShimmer 2.5s ease-in-out infinite;
}
@keyframes cdPop {
  0%   { transform: scale(.1); opacity: 0; }
  55%  { transform: scale(1.12); opacity: 1; }
  80%  { transform: scale(.97); }
  100% { transform: scale(1); opacity: 1; }
}

#cd-word {
  position: relative; z-index: 1;
  font-family: Georgia, serif;
  font-style: italic;
  font-size: clamp(1.8rem, 7vw, 4.5rem);
  letter-spacing: 6px;
  min-height: 1.2em;
  text-align: center;
  padding: 0 20px;
  /* Ocean silver-blue gradient on words */
  background: linear-gradient(
    135deg,
    #5a8fc0 0%,
    #8ec4e8 30%,
    #d0ecff 50%,
    #8ec4e8 70%,
    #5a8fc0 100%
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 16px rgba(100,180,255,0.85))
          drop-shadow(0 0 35px rgba(50,120,200,0.5));
  opacity: 0;
  transition: opacity .5s ease;
}
#cd-word.show { opacity: 1; }
.cdWordAnim { animation: cdWordFade .65s ease-out forwards; }
@keyframes cdWordFade {
  from { opacity: 0; transform: translateY(18px) scale(.9); letter-spacing: 14px; }
  to   { opacity: 1; transform: translateY(0) scale(1);     letter-spacing: 6px; }
}

#card-bottom-line {
  opacity: 0;
  transition: opacity 1s ease;
}
</style>
</head>
<body>

<!-- SECRET LOCK SCREEN -->
<div id="lock-screen">
  <canvas id="lock-particles"></canvas>
  <div id="lock-content">
    <div id="lock-icon">🔐</div>
    <div id="lock-hint">Enter the secret word</div>
    <div id="lock-clue">Hint: Animal in brown</div>
    <div id="lock-input-wrap">
      <input id="lock-input" type="text" placeholder="Type here..." autocomplete="off" autocorrect="off" spellcheck="false"/>
      <button id="lock-btn">UNLOCK ✦</button>
      <div id="lock-error">Wrong password. Try again! 🔒</div>
      <div id="lock-success">🔓 Unlocking...</div>
    </div>
  </div>
</div>

<!-- POST-UNLOCK COUNTDOWN -->
<div id="countdown-overlay">
  <canvas id="ocean-canvas"></canvas>
  <div id="cd-number"></div>
  <div id="cd-word"></div>
</div>

<div id="message">
  <div id="card">
    <div id="card-heading">Happy 23rd Birthday, Dot! ❤️</div>
    <div class="silver-line"></div>
    <span id="typing"></span>
    <div class="silver-line" id="card-bottom-line"></div>
    <div id="cake-wrap" style="
      opacity:0;
      transform:translateY(12px);
      transition:opacity 1s ease, transform 1s ease;
      text-align:center;
      margin-top:12px;
      padding-top:4px;
    ">
      <canvas id="cake-canvas"></canvas>
    </div>
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

/* ── MIDNIGHT OCEAN BACKGROUND ── */
(function initOcean() {
  const oc  = document.getElementById('ocean-canvas');
  const ox  = oc.getContext('2d');
  let active = false;

  function resizeOC() { oc.width = innerWidth; oc.height = innerHeight; }
  resizeOC(); window.addEventListener('resize', resizeOC);

  // Ocean ripple waves — multiple sine layers
  const WAVE_LAYERS = [
    { speed:0.0008, amp:0.018, freq:2.1, phase:0,    alpha:0.08, color:'#1a4a8a' },
    { speed:0.0012, amp:0.022, freq:3.3, phase:1.2,  alpha:0.06, color:'#1e5599' },
    { speed:0.0006, amp:0.015, freq:1.7, phase:2.4,  alpha:0.07, color:'#1560a8' },
    { speed:0.0015, amp:0.012, freq:4.5, phase:0.8,  alpha:0.05, color:'#0d3a7a' },
  ];

  // Light reflections — bright streaks that shimmer on the surface
  const reflections = Array.from({length: 18}, (_, i) => ({
    x:      Math.random() * innerWidth,
    y:      Math.random() * innerHeight,
    w:      20 + Math.random() * 80,
    h:      1.5 + Math.random() * 3,
    alpha:  0.04 + Math.random() * 0.12,
    speed:  0.0003 + Math.random() * 0.0008,
    phase:  Math.random() * Math.PI * 2,
    drift:  (Math.random() - 0.5) * 0.3,
  }));

  // Floating light particles (bioluminescence)
  const glows = Array.from({length: 35}, () => ({
    x:      Math.random() * innerWidth,
    y:      Math.random() * innerHeight,
    r:      1 + Math.random() * 3,
    alpha:  0.1 + Math.random() * 0.4,
    phase:  Math.random() * Math.PI * 2,
    speed:  0.0005 + Math.random() * 0.001,
    vx:     (Math.random() - 0.5) * 0.2,
    vy:     (Math.random() - 0.5) * 0.15,
    color:  Math.random() < 0.6
      ? `hsl(${200 + Math.random()*30}, 80%, ${60 + Math.random()*30}%)`
      : `hsl(${170 + Math.random()*20}, 70%, ${70 + Math.random()*25}%)`,
  }));

  let t = 0;

  function drawOcean() {
    if (!active) return;
    ox.clearRect(0, 0, oc.width, oc.height);

    // Deep ocean gradient base
    const bg = ox.createLinearGradient(0, 0, 0, oc.height);
    bg.addColorStop(0,   '#000810');
    bg.addColorStop(0.3, '#001428');
    bg.addColorStop(0.6, '#001e3a');
    bg.addColorStop(1,   '#000c1e');
    ox.fillStyle = bg;
    ox.fillRect(0, 0, oc.width, oc.height);

    // Subtle deep glow at center — like moonlight through water
    const moonGlow = ox.createRadialGradient(
      oc.width/2, oc.height*0.35, 0,
      oc.width/2, oc.height*0.35, oc.width * 0.55
    );
    moonGlow.addColorStop(0,   'rgba(40,90,160,0.18)');
    moonGlow.addColorStop(0.4, 'rgba(20,60,120,0.10)');
    moonGlow.addColorStop(1,   'rgba(0,10,30,0)');
    ox.fillStyle = moonGlow;
    ox.fillRect(0, 0, oc.width, oc.height);

    // Wave layers
    WAVE_LAYERS.forEach(w => {
      w.phase += w.speed;
      ox.save();
      ox.globalAlpha = w.alpha * (0.7 + Math.sin(t * 0.8) * 0.3);
      ox.fillStyle   = w.color;
      ox.beginPath();
      ox.moveTo(0, oc.height);
      for (let x = 0; x <= oc.width; x += 4) {
        const y = oc.height * (0.5 + w.amp * Math.sin(w.freq * x / oc.width * Math.PI * 2 + w.phase));
        ox.lineTo(x, y);
      }
      ox.lineTo(oc.width, oc.height);
      ox.closePath();
      ox.fill();
      ox.restore();
    });

    // Light reflections — shimmering surface streaks
    reflections.forEach(r => {
      r.phase += r.speed;
      r.x     += r.drift;
      if (r.x > oc.width + r.w)  r.x = -r.w;
      if (r.x < -r.w) r.x = oc.width + r.w;

      const shimmerAlpha = r.alpha * (0.4 + Math.abs(Math.sin(r.phase)) * 0.6);
      const rg = ox.createLinearGradient(r.x - r.w/2, r.y, r.x + r.w/2, r.y);
      rg.addColorStop(0,   'rgba(120,200,255,0)');
      rg.addColorStop(0.3, `rgba(140,210,255,${shimmerAlpha})`);
      rg.addColorStop(0.5, `rgba(200,235,255,${shimmerAlpha * 1.5})`);
      rg.addColorStop(0.7, `rgba(140,210,255,${shimmerAlpha})`);
      rg.addColorStop(1,   'rgba(120,200,255,0)');
      ox.save();
      ox.fillStyle = rg;
      ox.beginPath();
      ox.ellipse(r.x, r.y, r.w/2, r.h, 0, 0, Math.PI*2);
      ox.fill();
      ox.restore();
    });

    // Bioluminescent floating glows
    glows.forEach(g => {
      g.phase += g.speed;
      g.x += g.vx; g.y += g.vy;
      if (g.x < -10) g.x = oc.width + 10;
      if (g.x > oc.width + 10) g.x = -10;
      if (g.y < -10) g.y = oc.height + 10;
      if (g.y > oc.height + 10) g.y = -10;

      const ga = g.alpha * (0.3 + Math.abs(Math.sin(g.phase)) * 0.7);
      ox.save();
      ox.globalAlpha = ga;
      ox.fillStyle   = g.color;
      ox.shadowColor = g.color;
      ox.shadowBlur  = 12;
      ox.beginPath();
      ox.arc(g.x, g.y, g.r * (0.5 + Math.abs(Math.sin(g.phase))*0.8), 0, Math.PI*2);
      ox.fill();
      ox.restore();
    });

    t += 0.016;
    requestAnimationFrame(drawOcean);
  }

  // Start ocean when countdown begins
  window.startOcean = function() { active = true; drawOcean(); };
  window.stopOcean  = function() { active = false; };
})();
const lpc  = document.getElementById('lock-particles');
const lpx  = lpc.getContext('2d');
function resizeLPC(){ lpc.width=innerWidth; lpc.height=innerHeight; }
resizeLPC(); window.addEventListener('resize', resizeLPC);

const lockSparks = Array.from({length:70}, () => ({
  x:     Math.random() * innerWidth,
  y:     Math.random() * innerHeight,
  r:     0.4 + Math.random() * 1.6,
  alpha: 0.1 + Math.random() * 0.6,
  vx:    (Math.random() - 0.5) * 0.3,
  vy:    -(0.15 + Math.random() * 0.4),
  twinkle: Math.random() * Math.PI * 2,
  color: Math.random() < 0.6
    ? `hsl(${220 + Math.random()*40}, 70%, ${70 + Math.random()*25}%)`
    : `hsl(${180 + Math.random()*30}, 50%, ${80 + Math.random()*15}%)`
}));
let lockParticlesActive = true;
(function drawLPC() {
  if (!lockParticlesActive) return;
  lpx.clearRect(0, 0, lpc.width, lpc.height);
  lockSparks.forEach(s => {
    s.twinkle += 0.035;
    s.x += s.vx; s.y += s.vy;
    if (s.y < -5) { s.y = lpc.height+5; s.x = Math.random()*lpc.width; }
    const a = s.alpha * (0.4 + Math.abs(Math.sin(s.twinkle)) * 0.6);
    lpx.save();
    lpx.globalAlpha = a;
    lpx.fillStyle   = s.color;
    lpx.shadowColor = s.color;
    lpx.shadowBlur  = 8;
    lpx.beginPath();
    lpx.arc(s.x, s.y, s.r * (0.5 + Math.abs(Math.sin(s.twinkle))*0.8), 0, Math.PI*2);
    lpx.fill();
    lpx.restore();
  });
  requestAnimationFrame(drawLPC);
})();

/* ── PASSWORD UNLOCK ── */
const PASSWORD  = 'Capybara';
const lockInput = document.getElementById('lock-input');
const lockBtn   = document.getElementById('lock-btn');
const lockError = document.getElementById('lock-error');
const lockSucc  = document.getElementById('lock-success');
const lockWrap  = document.getElementById('lock-input-wrap');

function tryUnlock() {
  const val = lockInput.value.trim();
  if (val.toLowerCase() === PASSWORD.toLowerCase()) {
    // Correct! Show unlock message then reveal
    lockError.classList.remove('show');
    lockInput.style.borderColor = 'rgba(100,200,255,0.8)';
    lockInput.style.boxShadow   = '0 0 30px rgba(80,180,255,0.5)';
    lockBtn.disabled = true;
    document.getElementById('lock-icon').textContent = '🔓';
    lockSucc.classList.add('show');

    setTimeout(() => {
      document.getElementById('lock-screen').classList.add('hide');
      setTimeout(() => {
        document.getElementById('lock-screen').style.display = 'none';
        lockParticlesActive = false;
        startCountdownSequence();
      }, 1100);
    }, 900);
  } else {
    // Wrong — shake and show error
    lockError.classList.remove('show');
    void lockError.offsetWidth;
    lockError.classList.add('show');
    lockWrap.classList.remove('shake');
    void lockWrap.offsetWidth;
    lockWrap.classList.add('shake');
    lockInput.value = '';
    setTimeout(() => lockError.classList.remove('show'), 2500);
  }
}

  if (e.key === 'Enter') tryUnlock();
});

// ------------------------ Heart-shaped "I love you" particles ------------------------
let heartParticles = [];
let heartVisible=false;

function heart(t){
  return {
    x:16*Math.pow(Math.sin(t),3),
    y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
  };
}

function initHeartParticles(){
  heartParticles = [];
  const W      = canvas.width;
  const H      = canvas.height;
  const isMob  = W < 600;
  const minSize = isMob ? 5 : 6;
  const maxSize = isMob ? 8 : 11;
  const targetW = isMob ? W*0.38 : Math.min(W*0.30, H*0.40);
  const scale   = targetW / 16;
  const CX = W / 2;
  const CY = H / 2 - (isMob ? H*0.04 : H*0.05);
  for(let i = 0; i < 400; i++){
    const angle = Math.random() * Math.PI * 2;
    const pos   = heart(angle);
    const tx    = CX + pos.x * scale + (Math.random()-0.5)*3;
    const ty    = CY + pos.y * scale + (Math.random()-0.5)*3;
    const spread = Math.max(W, H) * 1.1;
    const startA = Math.random() * Math.PI * 2;
    const startR = spread * (0.3 + Math.random() * 0.7);
    const sx     = CX + Math.cos(startA) * startR;
    const sy     = CY + Math.sin(startA) * startR;
    const delay  = Math.random() * 1.8;
    const dur    = 1.0 + Math.random() * 0.8;
    heartParticles.push({
      angle, speed: 0.002 + Math.random()*0.003,
      size: minSize + Math.random()*(maxSize-minSize),
      sx, sy, tx, ty, cx: sx, cy: sy,
      delay, dur, arrived: false, arrivalTime: 0,
      offsetX: (Math.random()-0.5)*3,
      offsetY: (Math.random()-0.5)*3,
    });
  }
}

// ── Heart page state ──
let heartPageTime   = 0;
let heartMsgAlpha   = 0;
let heartMsgStarted = false;
let assemblyDone    = false;
let pageOutAlpha    = 0;
let pageFadingOut   = false;
const ASSEMBLY_DUR  = 3.5;
let shockwaveR = 0, shockwaveA = 1, shockwaveDone = false;

const fireflies = Array.from({length: 35}, () => ({
  x: Math.random(), y: Math.random(),
  vx: (Math.random()-0.5)*0.0012, vy: (Math.random()-0.5)*0.0010,
  r: 1.2 + Math.random()*2.2, phase: Math.random()*Math.PI*2,
  speed: 0.018 + Math.random()*0.035, alpha: 0.4 + Math.random()*0.5,
  color: Math.random()<0.6
    ? `hsl(${50+Math.random()*30},90%,${70+Math.random()*25}%)`
    : `hsl(${130+Math.random()*40},80%,${60+Math.random()*30}%)`,
}));

function easeOutQuart(t){ return 1-Math.pow(1-t,4); }

function drawHeartParticles(){
  if (!heartVisible) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const W = canvas.width, H = canvas.height;
  const isMob = W < 600;
  heartPageTime += 0.016;
  const CX = W/2, CY = H/2 - (isMob ? H*0.04 : H*0.05);

  // Fireflies
  const ffA = Math.min(heartPageTime/2.5, 1);
  fireflies.forEach(f => {
    f.phase += f.speed; f.x += f.vx; f.y += f.vy;
    if(f.x<0)f.x=1; if(f.x>1)f.x=0; if(f.y<0)f.y=1; if(f.y>1)f.y=0;
    const tw = 0.2+Math.abs(Math.sin(f.phase))*0.8;
    const a  = f.alpha*tw*ffA;
    const sz = f.r*(0.5+Math.abs(Math.sin(f.phase))*0.8);
    ctx.save();
    ctx.globalAlpha=a*0.85; ctx.fillStyle=f.color; ctx.shadowColor=f.color; ctx.shadowBlur=14;
    ctx.beginPath(); ctx.arc(f.x*W,f.y*H,sz,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=a*0.18; ctx.beginPath(); ctx.arc(f.x*W,f.y*H,sz*3.5,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Shockwave ring
  if (!shockwaveDone) {
    shockwaveR += 16; shockwaveA = Math.max(0, shockwaveA-0.020);
    if (shockwaveA<=0) shockwaveDone=true;
    ctx.save();
    ctx.globalAlpha=shockwaveA; ctx.strokeStyle='#4488ff';
    ctx.lineWidth=3; ctx.shadowColor='#88aaff'; ctx.shadowBlur=22;
    ctx.beginPath(); ctx.arc(CX,CY,shockwaveR,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=shockwaveA*0.4; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(CX,CY,shockwaveR*0.75,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // Assembly
  ctx.textAlign='center'; ctx.textBaseline='middle';
  let allArrived = true;
  heartParticles.forEach(p => {
    if (heartPageTime < p.delay) {
      allArrived = false;
      ctx.save(); ctx.globalAlpha=0.15+Math.sin(heartPageTime*4+p.sx)*0.08;
      ctx.fillStyle='#4488ff'; ctx.shadowColor='#4488ff'; ctx.shadowBlur=6;
      ctx.beginPath(); ctx.arc(p.sx,p.sy,p.size*0.4,0,Math.PI*2); ctx.fill(); ctx.restore();
      return;
    }
    if (!p.arrived) {
      const prog = Math.min((heartPageTime-p.delay)/p.dur, 1);
      const ease = easeOutQuart(prog);
      const midX = (p.sx+p.tx)/2+(p.ty-p.sy)*0.3;
      const midY = (p.sy+p.ty)/2-(p.tx-p.sx)*0.3;
      const t1   = 1-ease;
      p.cx = t1*t1*p.sx+2*t1*ease*midX+ease*ease*p.tx;
      p.cy = t1*t1*p.sy+2*t1*ease*midY+ease*ease*p.ty;
      if (prog>=1){ p.arrived=true; p.arrivalTime=heartPageTime; }
      else allArrived=false;
      // Trail dot
      ctx.save(); ctx.globalAlpha=ease*0.5; ctx.fillStyle='#6699ff';
      ctx.shadowColor='#4488ff'; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.arc(p.cx,p.cy,p.size*0.5,0,Math.PI*2); ctx.fill(); ctx.restore();
      // Flying text
      ctx.save(); ctx.globalAlpha=ease*0.85; ctx.fillStyle=`rgba(200,50,50,${ease})`;
      ctx.font=`bold ${p.size}px Arial`; ctx.fillText('I love you',p.cx,p.cy); ctx.restore();
    } else {
      // After assembly: flow continuously around heart shape
      p.angle += p.speed;
      const flash = Math.max(0,1-(heartPageTime-p.arrivalTime)*3);
      // Once flash done, draw at flowing position
      const pos = heart(p.angle);
      const targetW2 = isMob ? W*0.38 : Math.min(W*0.30, H*0.40);
      const scale2   = targetW2 / 16;
      const fx = CX + pos.x * scale2 + p.offsetX;
      const fy = CY + pos.y * scale2 + p.offsetY;
      ctx.save(); ctx.globalAlpha=1;
      if(flash>0){
        ctx.shadowColor='#fff'; ctx.shadowBlur=flash*12;
        ctx.fillStyle=`rgba(255,${50+Math.round(200*flash)},${50+Math.round(200*flash)},1)`;
        ctx.font=`bold ${p.size}px Arial`;
        ctx.fillText('I love you', p.tx+p.offsetX, p.ty+p.offsetY);
      } else {
        ctx.fillStyle='red';
        ctx.font=`bold ${p.size}px Arial`;
        ctx.fillText('I love you', fx, fy);
      }
      ctx.restore();
    }
  });

  if (allArrived && !assemblyDone) {
    assemblyDone = true;
    shockwaveR=0; shockwaveA=1.2; shockwaveDone=false;
  }

  // Gold message after assembly
  if (assemblyDone && !heartMsgStarted && heartPageTime > ASSEMBLY_DUR+1.0) heartMsgStarted=true;
  if (heartMsgStarted) {
    heartMsgAlpha = Math.min(heartMsgAlpha+0.007, 1);
    const fs1=isMob?11:14, fs2=isMob?13:17;
    const pulse=1+Math.sin(heartPageTime*1.1)*0.022;
    ctx.save(); ctx.globalAlpha=heartMsgAlpha; ctx.textAlign='center'; ctx.textBaseline='middle';
    const g1=ctx.createLinearGradient(CX-110,0,CX+110,0);
    g1.addColorStop(0,'#8B6914'); g1.addColorStop(0.25,'#c8940a');
    g1.addColorStop(0.5,'#ffffff'); g1.addColorStop(0.75,'#c8940a'); g1.addColorStop(1,'#8B6914');
    ctx.font=`italic ${fs1}px Georgia,serif`; ctx.fillStyle=g1;
    ctx.shadowColor='#ffd700'; ctx.shadowBlur=14;
    ctx.fillText('Cheers to another',CX,CY-(isMob?18:24));
    const g2=ctx.createLinearGradient(CX-80,0,CX+80,0);
    g2.addColorStop(0,'#8B6914'); g2.addColorStop(0.3,'#e8c060');
    g2.addColorStop(0.5,'#ffffff'); g2.addColorStop(0.7,'#e8c060'); g2.addColorStop(1,'#8B6914');
    ctx.font=`bold italic ${(fs2*pulse).toFixed(1)}px Georgia,serif`; ctx.fillStyle=g2;
    ctx.shadowColor='#ffd700'; ctx.shadowBlur=22;
    ctx.fillText('trip around the sun!',CX,CY+(isMob?8:11)); ctx.restore();
    if (heartMsgAlpha>=1 && heartPageTime>ASSEMBLY_DUR+6 && !pageFadingOut) pageFadingOut=true;
  }

  // Fade to black
  if (pageFadingOut) {
    pageOutAlpha=Math.min(pageOutAlpha+0.004,1);
    ctx.save(); ctx.globalAlpha=pageOutAlpha; ctx.fillStyle='#000';
    ctx.fillRect(0,0,W,H); ctx.restore();
  }

  requestAnimationFrame(drawHeartParticles);
}

// ------------------------ Confetti — only during typing ------------------------
let confettiParticles = [];
let confettiActive    = false;

function createConfetti(){
  confettiParticles = [];
  for(let i=0;i<150;i++){
    confettiParticles.push({
      x:     Math.random()*canvas.width,
      y:     Math.random()*canvas.height - canvas.height,
      r:     Math.random()*6 + 4,
      d:     Math.random()*10 + 2,
      color: `hsl(${Math.random()*360},100%,50%)`,
      tilt:  Math.random()*10 - 5
    });
  }
  confettiActive = true;
  drawConfettiLoop();
}

function drawConfettiLoop(){
  if(!confettiActive) return;
  // Only draw confetti on its own — heart canvas handles itself
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  confettiParticles.forEach(p=>{
    ctx.beginPath();
    ctx.fillStyle = p.color;
    ctx.moveTo(p.x + p.tilt,        p.y);
    ctx.lineTo(p.x + p.tilt + p.r/2, p.y + p.r);
    ctx.lineTo(p.x + p.tilt - p.r/2, p.y + p.r);
    ctx.closePath();
    ctx.fill();
    p.y += 2;
    p.x += Math.sin(p.y*0.05);
    if(p.y > canvas.height){ p.y = -10; p.x = Math.random()*canvas.width; }
  });
  requestAnimationFrame(drawConfettiLoop);
}

function stopConfetti(){
  confettiActive = false;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

/* ══════════════════════════════════════════════
   GIFT BOX — tap anywhere to open
══════════════════════════════════════════════ */
function showGiftBox(onOpen) {
  // Overlay div
  const wrap = document.createElement('div');
  wrap.style.cssText = `
    position:fixed; top:0; left:0; width:100%; height:100%;
    z-index:20; background:#000; cursor:pointer;
    opacity:0; transition:opacity .6s ease;
  `;

  // Canvas — absolutely centered
  const gc = document.createElement('canvas');
  gc.style.cssText = `
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    display:block;
  `;
  wrap.appendChild(gc);

  document.body.appendChild(wrap);
  requestAnimationFrame(() => requestAnimationFrame(() => { wrap.style.opacity = '1'; }));

  // Canvas size — fixed small pixels
  const isMob = window.innerWidth < 600;
  const BW = isMob ? 75 : 90;
  const BH = BW * 0.75;
  const LH = BW * 0.22;
  const PAD = 10;
  const canvasH = BH + LH + PAD*2;

  gc.width  = BW + PAD*2;
  gc.height = canvasH;
  gc.style.width  = (BW + PAD*2) + 'px';
  gc.style.height = canvasH + 'px';

  // Create and position label and hint below centered canvas
  const label = document.createElement('div');
  label.style.cssText = `
    position:absolute; left:50%; top:50%;
    transform:translate(-50%, ${Math.round(canvasH/2 + 14)}px);
    font-family:Georgia,serif; font-style:italic;
    font-size:clamp(13px,3vw,16px);
    color:#c8d8ff; letter-spacing:2px;
    text-align:center; white-space:nowrap;
    text-shadow:0 0 14px rgba(140,170,255,0.6);
  `;

  const hint = document.createElement('div');
  hint.style.cssText = `
    position:absolute; left:50%; top:50%;
    transform:translate(-50%, ${Math.round(canvasH/2 + 38)}px);
    font-family:Georgia,serif; font-size:clamp(11px,2.5vw,13px);
    color:rgba(140,170,255,0.5); letter-spacing:2px;
    text-align:center; white-space:nowrap;
    opacity:0; transition:opacity .8s ease;
  `;
  hint.textContent = '— tap anywhere to open —';

  wrap.appendChild(label);
  wrap.appendChild(hint);

  const gx  = gc.getContext('2d');
  const CX  = gc.width  / 2;
  const CY  = gc.height / 2 + LH/2;

  // State
  let phase    = 'idle';
  let shakeT   = 0;
  let lidOffY  = 0;
  let lidA     = 1;
  let boxA     = 1;
  let wrapA    = 1;

  function rRect(x, y, w, h, r) {
    gx.beginPath();
    gx.moveTo(x+r, y);
    gx.lineTo(x+w-r, y); gx.quadraticCurveTo(x+w, y, x+w, y+r);
    gx.lineTo(x+w, y+h-r); gx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    gx.lineTo(x+r, y+h); gx.quadraticCurveTo(x, y+h, x, y+h-r);
    gx.lineTo(x, y+r); gx.quadraticCurveTo(x, y, x+r, y);
    gx.closePath();
  }

  function drawFrame(shake) {
    gx.clearRect(0, 0, gc.width, gc.height);
    const bx = CX + shake;
    const by = CY;
    const rw = BW * 0.09;
    const hh = BW * 0.09;

    // ── BOX BODY ──
    gx.save();
    gx.globalAlpha = boxA;
    const bg = gx.createLinearGradient(bx-BW/2, by-BH/2, bx+BW/2, by+BH/2);
    bg.addColorStop(0, '#0d1540'); bg.addColorStop(0.5, '#1a2a6e'); bg.addColorStop(1, '#0a0e2a');
    gx.fillStyle = bg;
    gx.shadowColor = '#3366ff'; gx.shadowBlur = 25;
    rRect(bx-BW/2, by-BH/2, BW, BH, 10);
    gx.fill();
    gx.strokeStyle = 'rgba(140,170,255,0.55)'; gx.lineWidth = 1.5; gx.stroke();

    // Vertical ribbon
    const rg = gx.createLinearGradient(bx-rw/2, 0, bx+rw/2, 0);
    rg.addColorStop(0,'#4466cc'); rg.addColorStop(0.5,'#fff'); rg.addColorStop(1,'#4466cc');
    gx.fillStyle = rg; gx.shadowColor='#aaccff'; gx.shadowBlur=10;
    gx.fillRect(bx-rw/2, by-BH/2, rw, BH);

    // Horizontal ribbon
    const hg = gx.createLinearGradient(0, by-hh/2, 0, by+hh/2);
    hg.addColorStop(0,'#4466cc'); hg.addColorStop(0.5,'#fff'); hg.addColorStop(1,'#4466cc');
    gx.fillStyle = hg;
    gx.fillRect(bx-BW/2, by-hh/2, BW, hh);
    gx.restore();

    // ── LID ──
    gx.save();
    gx.globalAlpha = lidA * boxA;
    const lidTop = by - BH/2 - LH + lidOffY;
    const lg = gx.createLinearGradient(0, lidTop, 0, lidTop+LH);
    lg.addColorStop(0,'#1a2a6e'); lg.addColorStop(1,'#0d1540');
    gx.fillStyle = lg; gx.shadowColor='#3366ff'; gx.shadowBlur=20;
    rRect(bx-BW/2-6, lidTop, BW+12, LH, 10);
    gx.fill();
    gx.strokeStyle='rgba(140,170,255,0.5)'; gx.lineWidth=1.5; gx.stroke();
    // Lid ribbon
    gx.fillStyle = rg; gx.shadowColor='#aaccff'; gx.shadowBlur=8;
    gx.fillRect(bx-rw/2, lidTop, rw, LH);
    // Bow
    drawBow(bx, lidTop, BW * 0.13);
    gx.restore();
  }

  function drawBow(x, topY, sz) {
    gx.save();
    gx.shadowColor='#aaccff'; gx.shadowBlur=14;
    // Left loop
    gx.beginPath();
    gx.ellipse(x-sz*0.6, topY-sz*0.3, sz*0.5, sz*0.32, -0.4, 0, Math.PI*2);
    gx.fillStyle='#6688dd'; gx.fill();
    // Right loop
    gx.beginPath();
    gx.ellipse(x+sz*0.6, topY-sz*0.3, sz*0.5, sz*0.32, 0.4, 0, Math.PI*2);
    gx.fill();
    // Center
    gx.beginPath();
    gx.arc(x, topY-sz*0.1, sz*0.25, 0, Math.PI*2);
    const kg=gx.createRadialGradient(x,topY-sz*0.1,0,x,topY-sz*0.1,sz*0.25);
    kg.addColorStop(0,'#d0e0ff'); kg.addColorStop(1,'#4466cc');
    gx.fillStyle=kg; gx.fill();
    gx.restore();
  }

  // Sparkles
  const sparks = Array.from({length:10}, (_,i) => ({ a:(i/10)*Math.PI*2 }));

  let rafId;
  function loop() {
    const t = performance.now()/1000;
    let shake = 0;

    if (phase==='shake') {
      shakeT += 0.018;
      shake   = Math.sin(shakeT*28)*9*(1-shakeT/0.55);
      if (shakeT > 0.55) phase = 'open';
    }
    if (phase==='open') {
      lidOffY  -= isMob ? 9 : 12;
      lidA      = Math.max(0, lidA - 0.06);
      boxA      = Math.max(0, boxA - 0.032);
      if (boxA <= 0) phase = 'done';
    }
    if (phase==='done') {
      wrapA = Math.max(0, wrapA - 0.045);
      wrap.style.opacity = wrapA;
      if (wrapA <= 0) {
        cancelAnimationFrame(rafId);
        wrap.remove();
        onOpen();
        return;
      }
    }

    drawFrame(shake);

    // Sparkles orbit
    if (phase==='idle') {
      sparks.forEach((s,i)=>{
        s.a += 0.012;
        const r  = BW*0.60 + Math.sin(t*1.2+i)*6;
        const sx = CX + Math.cos(s.a)*r;
        const sy = CY - LH/2 + Math.sin(s.a)*r*0.45;
        const sa = 0.3 + Math.abs(Math.sin(t*1.8+i))*0.7;
        gx.save();
        gx.globalAlpha=sa; gx.fillStyle=i%2?'#ffd700':'#88aaff';
        gx.shadowColor=gx.fillStyle; gx.shadowBlur=8;
        gx.font=`${Math.round(BW*0.05)}px serif`;
        gx.textAlign='center'; gx.fillText('✦',sx,sy);
        gx.restore();
      });
    }

    rafId = requestAnimationFrame(loop);
  }
  loop();

  // Type prompt
  const PROMPT = 'A gift for you...';
  let pi = 0;
  function typeP() {
    if (pi < PROMPT.length) { label.textContent += PROMPT[pi++]; setTimeout(typeP, 65); }
    else { setTimeout(()=>{ hint.style.opacity='1'; }, 400); }
  }
  setTimeout(typeP, 500);

  // Tap anywhere
  wrap.addEventListener('click', () => {
    if (phase !== 'idle') return;
    phase = 'shake'; shakeT = 0;
  });
  wrap.addEventListener('touchstart', e => {
    e.preventDefault();
    if (phase !== 'idle') return;
    phase = 'shake'; shakeT = 0;
  }, {passive:false});
}

        showRosePrompt(() => {
          startFlowers(() => {
            setTimeout(() => {
              fadeFlowers(() => {
                heartVisible = true;
                initHeartParticles();
                drawHeartParticles();
              });
            }, 2200);
          });
        });
      }, 1600);
    }, 3800);
  }
}

/* ── BIRTHDAY CAKE drawn on canvas inside card ── */
function drawCardCake() {
  const cv = document.getElementById('cake-canvas');
  if (!cv) return;
  const isMob = window.innerWidth < 600;
  const W = isMob ? 130 : 160;
  const H = isMob ? 140 : 170;
  cv.width  = W; cv.height = H;
  cv.style.width  = W+'px'; cv.style.height = H+'px';
  const c  = cv.getContext('2d');
  const cx = W / 2;

  // Layout from bottom up
  const groundY = H - 8;
  const botH    = H * 0.28;
  const botW    = W * 0.80;
  const botY    = groundY - botH;
  const topH    = H * 0.22;
  const topW    = W * 0.55;
  const topY    = botY - topH - 2;
  const candH   = H * 0.15;
  const candY   = topY;            // candle base sits on top of upper tier
  const flameY  = candY - candH;   // flame above candle

  function drawTier(tx, ty, tw, th, colLight, colDark, hasDots) {
    const r = 5;
    // Body gradient
    const g = c.createLinearGradient(tx-tw/2, ty, tx+tw/2, ty+th);
    g.addColorStop(0,   colLight);
    g.addColorStop(0.5, colDark);
    g.addColorStop(1,   colLight);
    c.save();
    c.shadowColor = 'rgba(100,150,255,0.4)'; c.shadowBlur = 10;
    c.fillStyle = g;
    c.beginPath();
    c.moveTo(tx-tw/2+r, ty);
    c.lineTo(tx+tw/2-r, ty); c.quadraticCurveTo(tx+tw/2, ty, tx+tw/2, ty+r);
    c.lineTo(tx+tw/2, ty+th-r); c.quadraticCurveTo(tx+tw/2, ty+th, tx+tw/2-r, ty+th);
    c.lineTo(tx-tw/2+r, ty+th); c.quadraticCurveTo(tx-tw/2, ty+th, tx-tw/2, ty+th-r);
    c.lineTo(tx-tw/2, ty+r); c.quadraticCurveTo(tx-tw/2, ty, tx-tw/2+r, ty);
    c.closePath(); c.fill();
    // Border
    c.strokeStyle = 'rgba(140,180,255,0.5)'; c.lineWidth = 1; c.stroke();
    c.restore();

    // White frosting drips
    c.save(); c.fillStyle = 'rgba(255,255,255,0.92)';
    for (let d = 0; d < 5; d++) {
      const dx = tx-tw/2+10 + d*(tw-20)/4;
      const dh = 4 + Math.sin(d*1.8)*2.5;
      c.beginPath(); c.moveTo(dx-4,ty);
      c.quadraticCurveTo(dx, ty+dh+3, dx+4, ty);
      c.fill();
    }
    c.restore();

    // Coloured dots on bottom tier
    if (hasDots) {
      const cols = ['#a0c4ff','#bde0ff','#90e0ef','#00b4d8','#caf0f8'];
      cols.forEach((col, d) => {
        const dx = tx-tw/2+12 + d*(tw-24)/4;
        c.save(); c.fillStyle=col; c.shadowColor=col; c.shadowBlur=5;
        c.beginPath(); c.arc(dx, ty+th/2, 3, 0, Math.PI*2); c.fill(); c.restore();
      });
    }
  }

  function drawFrame(t) {
    c.clearRect(0, 0, W, H);

    // Plate
    c.save();
    const pg = c.createLinearGradient(cx-botW/2-4, groundY, cx+botW/2+4, groundY+6);
    pg.addColorStop(0,'#1a2a6e'); pg.addColorStop(0.5,'#3a5aae'); pg.addColorStop(1,'#1a2a6e');
    c.fillStyle=pg; c.shadowColor='rgba(80,120,255,0.4)'; c.shadowBlur=8;
    c.beginPath(); c.ellipse(cx, groundY, botW/2+6, 7, 0, 0, Math.PI*2); c.fill(); c.restore();

    // Bottom tier — lighter blue
    drawTier(cx, botY, botW, botH, '#2255aa', '#0d1d6e', true);
    // Top tier — mid blue
    drawTier(cx, topY, topW, topH, '#1a4090', '#0a1550', false);

    // 3 candles
    [cx-15, cx, cx+15].forEach((cx2, ci) => {
      const cw = 5;
      // Body
      const cg = c.createLinearGradient(cx2-cw/2, 0, cx2+cw/2, 0);
      cg.addColorStop(0,'#ddeeff');
      cg.addColorStop(0.5, ['#4488ff','#88aaff','#2266dd'][ci]);
      cg.addColorStop(1,'#aaccff');
      c.save(); c.fillStyle=cg;
      c.shadowColor='rgba(100,160,255,0.4)'; c.shadowBlur=4;
      c.fillRect(cx2-cw/2, candY-candH, cw, candH); c.restore();
      // Wick
      c.save(); c.strokeStyle='#555'; c.lineWidth=1;
      c.beginPath(); c.moveTo(cx2, candY-candH); c.lineTo(cx2, candY-candH-3); c.stroke(); c.restore();
      // Outer flame glow
      const fw = 3.5+Math.sin(t*6+ci)*1.2;
      const fh = 8+Math.sin(t*5+ci)*2;
      const fx = cx2+Math.sin(t*4+ci)*1;
      const fy = candY-candH-3;
      const fo = c.createRadialGradient(fx,fy,0,fx,fy,fh);
      fo.addColorStop(0,'rgba(255,240,160,1)');
      fo.addColorStop(0.5,'rgba(255,130,10,0.85)');
      fo.addColorStop(1,'rgba(255,50,0,0)');
      c.save(); c.fillStyle=fo;
      c.beginPath();
      c.moveTo(fx,fy-fh);
      c.bezierCurveTo(fx+fw,fy-fh*0.4,fx+fw*0.8,fy+2,fx,fy+2);
      c.bezierCurveTo(fx-fw*0.8,fy+2,fx-fw,fy-fh*0.4,fx,fy-fh);
      c.fill(); c.restore();
      // White core
      c.save();
      const fc = c.createRadialGradient(fx,fy-fh*0.3,0,fx,fy-fh*0.3,fw*0.6);
      fc.addColorStop(0,'rgba(255,255,255,1)'); fc.addColorStop(1,'rgba(255,200,50,0)');
      c.fillStyle=fc; c.beginPath(); c.arc(fx,fy-fh*0.3,fw*0.6,0,Math.PI*2); c.fill(); c.restore();
    });
  }

  (function loop(){
    if (!document.getElementById('cake-canvas')) return;
    drawFrame(performance.now()/1000);
    requestAnimationFrame(loop);
  })();
}

/* ── Rose click prompt ──
   Shows a typing message + glowing 🌹
   When user clicks/taps the rose → callback fires
*/
function showRosePrompt(onClicked) {
  // Create overlay div
  const el = document.createElement('div');
  el.id = 'rose-prompt';
  el.style.cssText = `
    position:fixed; inset:0; z-index:10;
    background:#000;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:clamp(16px,4vh,28px);
    font-family: Georgia, serif;
    opacity:0; transition: opacity 0.8s ease;
  `;

  // Typing message text
  const msgEl = document.createElement('div');
  msgEl.style.cssText = `
    font-size: clamp(14px,3.5vw,20px);
    color: #c8d8ff;
    font-style: italic;
    letter-spacing: 1.5px;
    text-align: center;
    padding: 0 24px;
    text-shadow: 0 0 12px rgba(140,170,255,0.5);
    min-height: 1.4em;
  `;
  el.appendChild(msgEl);

  // Glowing rose button
  const roseEl = document.createElement('div');
  roseEl.style.cssText = `
    font-size: clamp(52px,16vw,90px);
    cursor: pointer;
    filter: drop-shadow(0 0 18px rgba(255,80,120,0.7))
            drop-shadow(0 0 40px rgba(200,50,100,0.5));
    animation: rosePulse 1.8s ease-in-out infinite;
    user-select: none;
    -webkit-user-select: none;
    opacity: 0;
    transition: opacity 0.6s ease, transform 0.15s ease;
  `;
  roseEl.textContent = '🌹';
  el.appendChild(roseEl);

  // "Tap to bloom" hint
  const hintEl = document.createElement('div');
  hintEl.style.cssText = `
    font-size: clamp(11px,2.8vw,14px);
    color: rgba(140,170,255,0.55);
    letter-spacing: 2px;
    font-style: italic;
    opacity: 0;
    transition: opacity 0.6s ease;
  `;
  hintEl.textContent = '— tap the rose —';
  el.appendChild(hintEl);

  // Add keyframe animation
  if (!document.getElementById('rose-style')) {
    const st = document.createElement('style');
    st.id = 'rose-style';
    st.textContent = `
      @keyframes rosePulse {
        0%,100% {
          filter: drop-shadow(0 0 14px rgba(255,80,120,0.7))
                  drop-shadow(0 0 32px rgba(200,50,100,0.4));
          transform: scale(1);
        }
        50% {
          filter: drop-shadow(0 0 28px rgba(255,120,160,1.0))
                  drop-shadow(0 0 55px rgba(220,60,110,0.7));
          transform: scale(1.08);
        }
      }
      @keyframes roseClick {
        0%   { transform: scale(1); }
        40%  { transform: scale(0.85); }
        100% { transform: scale(1.5); opacity:0; }
      }
    `;
    document.head.appendChild(st);
  }

  document.body.appendChild(el);

  // Fade in overlay
  requestAnimationFrame(() => {
    requestAnimationFrame(() => { el.style.opacity = '1'; });
  });

  // Type the prompt message
  const promptText = 'Something is growing for you...';
  let pi = 0;
  function typePrompt() {
    if (pi < promptText.length) {
      msgEl.textContent += promptText[pi++];
      setTimeout(typePrompt, 55);
    } else {
      // Show rose + hint after text finishes
      setTimeout(() => {
        roseEl.style.opacity = '1';
        setTimeout(() => { hintEl.style.opacity = '1'; }, 400);
      }, 300);
    }
  }
  setTimeout(typePrompt, 500);

  // Click / tap handler — entire screen works
  function handleClick() {
    roseEl.removeEventListener('click',      handleClick);
    el.removeEventListener('click',          handleClickEl);
    roseEl.removeEventListener('touchstart', handleTapRose);
    el.removeEventListener('touchstart',     handleTapEl);

    roseEl.style.animation = 'roseClick 0.5s ease-out forwards';
    hintEl.style.opacity   = '0';
    msgEl.style.opacity    = '0';

    setTimeout(() => {
      el.style.opacity = '0';
      setTimeout(() => { el.remove(); onClicked(); }, 800);
    }, 400);
  }
  function handleClickEl(e) { handleClick(); }
  function handleTapRose(e) { e.preventDefault(); handleClick(); }
  function handleTapEl(e)   { e.preventDefault(); handleClick(); }

  roseEl.addEventListener('click',      handleClick);
  el.addEventListener('click',          handleClickEl);
  roseEl.addEventListener('touchstart', handleTapRose, {passive:false});
  el.addEventListener('touchstart',     handleTapEl,   {passive:false});
}

/* ══════════════════════════════════════════════════
   GLOWING FLOWERS — grow from bottom, bloom, glow
   Like the reference image: cyan/white bioluminescent
   flowers growing up with stems, leaves, petals
══════════════════════════════════════════════════ */
let flowerCanvas, flowerCtx, flowerAlpha = 0, flowerActive = false;

function startFlowers(onDone) {
  // Create flower canvas
  flowerCanvas = document.createElement('canvas');
  flowerCanvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:5;pointer-events:none;';
  document.body.appendChild(flowerCanvas);
  flowerCtx = flowerCanvas.getContext('2d');
  flowerCanvas.width  = window.innerWidth;
  flowerCanvas.height = window.innerHeight;

  flowerActive = true;
  flowerAlpha  = 1;

  const W = flowerCanvas.width;
  const H = flowerCanvas.height;
  const isMob = W < 600;

  // 6 blue roses spread across screen
  const flowers = [
    { x: W*0.15, stemH: isMob?H*0.30:H*0.36, delay:0.0,  size: isMob?0.55:0.80, lean:-0.05 },
    { x: W*0.30, stemH: isMob?H*0.38:H*0.44, delay:0.25, size: isMob?0.70:1.00, lean:-0.04 },
    { x: W*0.45, stemH: isMob?H*0.46:H*0.54, delay:0.10, size: isMob?0.85:1.25, lean: 0.00 },
    { x: W*0.60, stemH: isMob?H*0.42:H*0.48, delay:0.35, size: isMob?0.75:1.05, lean: 0.03 },
    { x: W*0.75, stemH: isMob?H*0.34:H*0.40, delay:0.20, size: isMob?0.65:0.90, lean: 0.05 },
    { x: W*0.88, stemH: isMob?H*0.28:H*0.34, delay:0.45, size: isMob?0.55:0.75, lean: 0.06 },
  ];

  // Assign unique sway phase per flower
  flowers.forEach((f, i) => {
    f.swayPhase = i * 1.1 + Math.random() * 0.5;
    f.swaySpeed = 0.7 + Math.random() * 0.4;
    f.swayAmp   = 0.012 + Math.random() * 0.010;
  });

  const startTime = performance.now();
  const GROW_DUR  = 2200;
  const BLOOM_DUR = 800;

  // Typing message state
  const FLOWER_MSG = 'Flowers for you 🌹';
  let msgText      = '';
  let msgI         = 0;
  let msgStarted   = false;
  let msgAlpha     = 0;

  let doneCalled = false;

  function drawFlowers() {
    if (!flowerActive) return;
    flowerCtx.clearRect(0, 0, W, H);

    // Dark background
    flowerCtx.fillStyle = 'rgba(0,0,0,0.92)';
    flowerCtx.fillRect(0, 0, W, H);

    const elapsed = (performance.now() - startTime) / 1000;

    let allDone = true;

    flowers.forEach(f => {
      const localT = elapsed - f.delay;
      if (localT < 0) { allDone = false; return; }

      const growProg  = Math.min(localT / (GROW_DUR/1000), 1);
      const bloomProg = Math.min(Math.max((localT - GROW_DUR/1000) / (BLOOM_DUR/1000), 0), 1);
      if (growProg < 1 || bloomProg < 1) allDone = false;

      const easeG = easeOutCubic(growProg);
      const easeB = easeOutBack(bloomProg);

      // Sway — gentle side-to-side once fully grown
      const swayAmount = growProg >= 1
        ? Math.sin(elapsed * f.swaySpeed + f.swayPhase) * f.swayAmp * f.stemH
        : 0;

      const groundY = H * 0.88;
      const tipY    = groundY - f.stemH * easeG;
      const tipX    = f.x + f.lean * f.stemH * easeG + swayAmount;
      const baseX   = f.x + swayAmount * 0.15; // base moves slightly too
      const S       = f.size;

      if (growProg > 0.1) drawGrass(f.x, groundY, S, Math.min((growProg-0.1)/0.3, 1));
      drawStem(baseX, groundY, tipX, tipY, S, easeG);
      if (growProg > 0.3) drawLeaves(baseX, groundY, tipX, tipY, S, Math.min((growProg-0.3)/0.5, 1), f.lean);
      if (growProg >= 1)  drawBloom(tipX, tipY, S, easeB, elapsed + f.delay, elapsed);
    });

    // Ambient glow particles
    drawGlowParticles(elapsed, W, H);

    // Start typing message once all flowers are bloomed
    if (allDone && !msgStarted) {
      msgStarted = true;
      typeFlowerMsg();
    }

    // Draw typing message at bottom center
    if (msgText.length > 0) {
      msgAlpha = Math.min(msgAlpha + 0.03, 1);
      const fs = isMob ? 18 : 24;
      flowerCtx.save();
      flowerCtx.globalAlpha  = msgAlpha;
      flowerCtx.textAlign    = 'center';
      flowerCtx.textBaseline = 'middle';
      flowerCtx.font         = `italic bold ${fs}px Georgia, serif`;
      // Blue shimmer gradient on text
      const tg = flowerCtx.createLinearGradient(W/2 - 120, H*0.12, W/2 + 120, H*0.12);
      tg.addColorStop(0,   '#4488ff');
      tg.addColorStop(0.4, '#88bbff');
      tg.addColorStop(0.5, '#ffffff');
      tg.addColorStop(0.6, '#88bbff');
      tg.addColorStop(1,   '#4488ff');
      flowerCtx.fillStyle   = tg;
      flowerCtx.shadowColor = '#6699ff';
      flowerCtx.shadowBlur  = 20;
      flowerCtx.fillText(msgText, W/2, H * 0.12);
      flowerCtx.restore();
    }

    if (allDone && !doneCalled && msgText === FLOWER_MSG) {
      doneCalled = true;
      if (onDone) setTimeout(onDone, 1200);
    }

    requestAnimationFrame(drawFlowers);
  }

  function typeFlowerMsg() {
    if (msgI < FLOWER_MSG.length) {
      msgText += FLOWER_MSG[msgI++];
      setTimeout(typeFlowerMsg, 60);
    }
  }

  drawFlowers();
}

function fadeFlowers(onDone) {
  if (!flowerCanvas) { if(onDone) onDone(); return; }
  let a = 1;
  const fade = setInterval(() => {
    a -= 0.04;
    flowerCanvas.style.opacity = Math.max(0, a);
    if (a <= 0) {
      clearInterval(fade);
      flowerActive = false;
      if (flowerCanvas.parentNode) flowerCanvas.parentNode.removeChild(flowerCanvas);
      if (onDone) onDone();
    }
  }, 20);
}

// ── Draw realistic rose stem with thorns ──
function drawStem(bx, by, tx, ty, S, prog) {
  const ctx  = flowerCtx;
  const cp1x = bx + (tx - bx) * 0.25 + (tx - bx) * 0.15;
  const cp1y = by + (ty - by) * 0.25;
  const cp2x = bx + (tx - bx) * 0.70 - (tx - bx) * 0.10;
  const cp2y = by + (ty - by) * 0.65;

  // How far along the stem to draw (based on prog)
  const pts = [];
  for (let i = 0; i <= 30; i++) {
    const t2 = (i / 30) * prog;
    const mt = 1 - t2;
    pts.push({
      x: mt*mt*mt*bx + 3*mt*mt*t2*cp1x + 3*mt*t2*t2*cp2x + t2*t2*t2*tx,
      y: mt*mt*mt*by + 3*mt*mt*t2*cp1y + 3*mt*t2*t2*cp2y + t2*t2*t2*ty,
    });
  }

  // Outer glow pass
  ctx.save();
  ctx.beginPath();
  pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
  ctx.strokeStyle = 'rgba(40,120,255,0.12)';
  ctx.lineWidth   = 11 * S;
  ctx.shadowColor = '#3366ff';
  ctx.shadowBlur  = 18;
  ctx.lineJoin    = 'round';
  ctx.lineCap     = 'round';
  ctx.stroke();
  ctx.restore();

  // Main stem — dark green with gradient
  const stemGrad = ctx.createLinearGradient(bx, by, tx, ty);
  stemGrad.addColorStop(0,   '#0d3d1f');
  stemGrad.addColorStop(0.4, '#1a6632');
  stemGrad.addColorStop(0.7, '#155c2a');
  stemGrad.addColorStop(1,   '#0f4a20');
  ctx.save();
  ctx.beginPath();
  pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
  ctx.strokeStyle = stemGrad;
  ctx.lineWidth   = 4.5 * S;
  ctx.shadowColor = '#2255cc';
  ctx.shadowBlur  = 8;
  ctx.lineJoin    = 'round';
  ctx.lineCap     = 'round';
  ctx.stroke();
  ctx.restore();

  // Highlight edge
  ctx.save();
  ctx.beginPath();
  pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x-1,p.y) : ctx.lineTo(p.x-1,p.y));
  ctx.strokeStyle = 'rgba(100,200,140,0.35)';
  ctx.lineWidth   = 1.2 * S;
  ctx.lineJoin    = 'round'; ctx.lineCap = 'round';
  ctx.stroke();
  ctx.restore();

  // Thorns — small curved spikes along stem
  if (prog > 0.25) {
    [[0.28, -1],[0.45, 1],[0.62, -1],[0.78, 1]].forEach(([t2, side]) => {
      if (t2 > prog) return;
      const mt  = 1 - t2;
      const px  = mt*mt*mt*bx + 3*mt*mt*t2*cp1x + 3*mt*t2*t2*cp2x + t2*t2*t2*tx;
      const py  = mt*mt*mt*by + 3*mt*mt*t2*cp1y + 3*mt*t2*t2*cp2y + t2*t2*t2*ty;
      // tangent
      const dt  = 0.01;
      const mt2 = 1-(t2+dt);
      const nx  = mt2*mt2*mt2*bx+3*mt2*mt2*(t2+dt)*cp1x+3*mt2*(t2+dt)*(t2+dt)*cp2x+(t2+dt)*(t2+dt)*(t2+dt)*tx;
      const ny  = mt2*mt2*mt2*by+3*mt2*mt2*(t2+dt)*cp1y+3*mt2*(t2+dt)*(t2+dt)*cp2y+(t2+dt)*(t2+dt)*(t2+dt)*ty;
      const ang = Math.atan2(ny-py, nx-px) + side * 0.55 - Math.PI/2;
      const tl  = 7 * S;
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.quadraticCurveTo(
        px + Math.cos(ang)*tl*0.6, py + Math.sin(ang)*tl*0.6,
        px + Math.cos(ang)*tl, py + Math.sin(ang)*tl
      );
      ctx.strokeStyle = '#1a6632';
      ctx.lineWidth   = 1.8 * S;
      ctx.lineCap     = 'round';
      ctx.shadowColor = '#2255cc';
      ctx.shadowBlur  = 4;
      ctx.stroke();
      ctx.restore();
    });
  }
}

// ── Draw realistic compound rose leaves ──
function drawLeaves(bx, by, tx, ty, S, prog, lean) {
  const ctx  = flowerCtx;
  const cp1x = bx + (tx-bx)*0.25 + (tx-bx)*0.15;
  const cp1y = by + (ty-by)*0.25;
  const cp2x = bx + (tx-bx)*0.70 - (tx-bx)*0.10;
  const cp2y = by + (ty-by)*0.65;

  // Each leaf group: [stemT, side, scale, branchAngle]
  const leafGroups = [
    [0.32, -1, 1.0,  0.55],
    [0.32,  1, 0.85, 0.55],
    [0.55, -1, 0.88, 0.50],
    [0.55,  1, 1.0,  0.50],
    [0.72, -1, 0.75, 0.45],
    [0.72,  1, 0.80, 0.45],
  ];

  leafGroups.forEach(([t2, side, sc, bAng]) => {
    if (t2 > prog * 1.1) return;
    const lp = Math.min((prog - t2 + 0.1) / 0.22, 1);
    if (lp <= 0) return;

    const mt  = 1 - t2;
    const px  = mt*mt*mt*bx+3*mt*mt*t2*cp1x+3*mt*t2*t2*cp2x+t2*t2*t2*tx;
    const py  = mt*mt*mt*by+3*mt*mt*t2*cp1y+3*mt*t2*t2*cp2y+t2*t2*t2*ty;

    // Tangent for branch angle
    const dt   = 0.015;
    const mt2  = 1-(t2+dt);
    const nx   = mt2*mt2*mt2*bx+3*mt2*mt2*(t2+dt)*cp1x+3*mt2*(t2+dt)*(t2+dt)*cp2x+(t2+dt)*(t2+dt)*(t2+dt)*tx;
    const ny   = mt2*mt2*mt2*by+3*mt2*mt2*(t2+dt)*cp1y+3*mt2*(t2+dt)*(t2+dt)*cp2y+(t2+dt)*(t2+dt)*(t2+dt)*ty;
    const stemAng = Math.atan2(ny-py, nx-px);
    const branchAng = stemAng + side * bAng;

    const branchLen = 28 * S * sc * easeOutCubic(lp);
    const bex = px + Math.cos(branchAng) * branchLen;
    const bey = py + Math.sin(branchAng) * branchLen;

    // Draw branch line
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(bex, bey);
    ctx.strokeStyle = '#155c2a';
    ctx.lineWidth   = 1.8 * S;
    ctx.shadowColor = '#2255cc';
    ctx.shadowBlur  = 6;
    ctx.lineCap     = 'round';
    ctx.stroke();
    ctx.restore();

    // Draw 3 leaflets per group (compound rose leaf)
    const leaflets = [
      { off: 0,   len: 22*S*sc, w: 9*S*sc, ang: 0 },
      { off:-0.3, len: 16*S*sc, w: 7*S*sc, ang:-0.4*side },
      { off: 0.3, len: 16*S*sc, w: 7*S*sc, ang: 0.4*side },
    ];

    leaflets.forEach(lf => {
      if (lp < 0.3) return;
      const lfp   = Math.min((lp - 0.3) / 0.7, 1);
      const leafL = lf.len * easeOutBack(lfp);
      const leafW = lf.w  * easeOutBack(lfp);
      const la    = branchAng + lf.ang + lf.off * 0.3;
      const lsx   = bex + Math.cos(branchAng) * lf.off * 8 * S;
      const lsy   = bey + Math.sin(branchAng) * lf.off * 8 * S;
      const lex   = lsx + Math.cos(la) * leafL;
      const ley   = lsy + Math.sin(la) * leafL;

      // Leaf gradient — dark to mid green with blue tint
      const lg = ctx.createLinearGradient(lsx, lsy, lex, ley);
      lg.addColorStop(0,   '#0d3d1f');
      lg.addColorStop(0.4, '#1a6632');
      lg.addColorStop(1,   '#0f5225');

      ctx.save();
      ctx.beginPath();
      // Leaf shape — pointed oval with slight curve
      ctx.moveTo(lsx, lsy);
      ctx.bezierCurveTo(
        lsx + Math.cos(la - 0.45)*leafL*0.55, lsy + Math.sin(la - 0.45)*leafL*0.55,
        lex + Math.cos(la - 0.45)*leafW*0.4,  ley + Math.sin(la - 0.45)*leafW*0.4,
        lex, ley
      );
      ctx.bezierCurveTo(
        lex + Math.cos(la + 0.45)*leafW*0.4,  ley + Math.sin(la + 0.45)*leafW*0.4,
        lsx + Math.cos(la + 0.45)*leafL*0.55, lsy + Math.sin(la + 0.45)*leafL*0.55,
        lsx, lsy
      );
      ctx.closePath();
      ctx.fillStyle   = lg;
      ctx.shadowColor = '#2255cc';
      ctx.shadowBlur  = 10;
      ctx.fill();

      // Serrated edge highlight
      ctx.strokeStyle = 'rgba(80,180,120,0.35)';
      ctx.lineWidth   = 0.7;
      ctx.stroke();

      // Central vein
      ctx.beginPath();
      ctx.moveTo(lsx, lsy);
      ctx.lineTo(lex, ley);
      ctx.strokeStyle = 'rgba(120,220,160,0.45)';
      ctx.lineWidth   = 0.8;
      ctx.lineCap     = 'round';
      ctx.shadowBlur  = 4;
      ctx.stroke();

      // Side veins
      for (let v = 1; v <= 3; v++) {
        const vt   = v / 4;
        const vmx  = lsx + (lex-lsx)*vt;
        const vmy  = lsy + (ley-lsy)*vt;
        const vlen = leafW * 0.5 * (1 - vt*0.4);
        [-1,1].forEach(vs => {
          ctx.beginPath();
          ctx.moveTo(vmx, vmy);
          ctx.lineTo(
            vmx + Math.cos(la + vs*1.1)*vlen,
            vmy + Math.sin(la + vs*1.1)*vlen
          );
          ctx.strokeStyle = 'rgba(100,200,140,0.3)';
          ctx.lineWidth   = 0.5;
          ctx.stroke();
        });
      }
      ctx.restore();
    });
  });
}

// ── Realistic grass/ground cover at base ──
function drawGrass(x, y, S, prog) {
  const ctx = flowerCtx;
  const blades = [
    [-28,-0.28,55],[-20,-0.18,48],[-12,-0.10,42],[-5,-0.05,38],
    [ 5, 0.05,40],[ 12, 0.12,44],[ 20, 0.20,50],[ 28, 0.28,52],
    [-16,-0.14,35],[16, 0.16,36],[-8,-0.06,32],[8, 0.08,33],
  ];
  blades.forEach(([dx, lean, baseH]) => {
    const h = baseH * S * prog;
    const cp1x = x+dx + lean*h*0.5;
    const cp1y = y - h*0.55;
    const tip  = { x: x+dx + lean*h*1.4, y: y-h };
    // Width taper
    const w    = (1.8 + Math.random()*0.5) * S;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x+dx - w, y);
    ctx.quadraticCurveTo(cp1x - w*0.5, cp1y, tip.x, tip.y);
    ctx.quadraticCurveTo(cp1x + w*0.5, cp1y, x+dx + w, y);
    ctx.closePath();
    const gg = ctx.createLinearGradient(x+dx, y, tip.x, tip.y);
    gg.addColorStop(0,   '#0a2e14');
    gg.addColorStop(0.5, '#155c2a');
    gg.addColorStop(1,   '#0d4a1e');
    ctx.fillStyle   = gg;
    ctx.shadowColor = '#2255cc';
    ctx.shadowBlur  = 6;
    ctx.fill();
    // Highlight vein
    ctx.beginPath();
    ctx.moveTo(x+dx, y);
    ctx.quadraticCurveTo(cp1x, cp1y, tip.x, tip.y);
    ctx.strokeStyle = 'rgba(80,180,120,0.3)';
    ctx.lineWidth   = 0.6;
    ctx.lineCap     = 'round';
    ctx.stroke();
    ctx.restore();
  });
}

// ── Draw blue rose bloom with petal shine ──
function drawBloom(x, y, S, prog, t, elapsed) {
  const ctx   = flowerCtx;
  const rSize = 22 * S * prog;

  // Outer glow halo — pulses gently
  const haloPulse = 1 + Math.sin(elapsed * 1.8) * 0.12;
  ctx.save();
  const halo = ctx.createRadialGradient(x, y, 0, x, y, rSize * 2.8 * haloPulse);
  halo.addColorStop(0,    `rgba(100,160,255,${0.32*prog})`);
  halo.addColorStop(0.35, `rgba(60,100,255,${0.15*prog})`);
  halo.addColorStop(1,    'rgba(0,20,80,0)');
  ctx.fillStyle = halo;
  ctx.beginPath();
  ctx.arc(x, y, rSize*2.8*haloPulse, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // ── Sepal ──
  for (let s = 0; s < 5; s++) {
    const sa = (s/5)*Math.PI*2 + t*0.1;
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(x+Math.cos(sa)*rSize*0.5, y+Math.sin(sa)*rSize*0.5, rSize*0.22, rSize*0.55, sa, 0, Math.PI*2);
    ctx.fillStyle='#1a5c3a'; ctx.shadowColor='#2288ff'; ctx.shadowBlur=8; ctx.globalAlpha=0.9*prog;
    ctx.fill();
    ctx.restore();
  }

  // ── Outer petals with shine ──
  for (let p = 0; p < 7; p++) {
    const angle = (p/7)*Math.PI*2 + t*0.25;
    const px    = x + Math.cos(angle)*rSize*0.85;
    const py    = y + Math.sin(angle)*rSize*0.85;

    const pg = ctx.createRadialGradient(px, py, 0, px, py, rSize*0.65);
    pg.addColorStop(0,   `rgba(160,200,255,${0.95*prog})`);
    pg.addColorStop(0.4, `rgba(60,110,255,${0.9*prog})`);
    pg.addColorStop(1,   `rgba(20,50,180,${0.7*prog})`);
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(px, py, rSize*0.52, rSize*0.72, angle+Math.PI/2, 0, Math.PI*2);
    ctx.fillStyle=pg; ctx.shadowColor='#6699ff'; ctx.shadowBlur=16; ctx.fill();
    ctx.restore();

    // ── Petal shine — rotating highlight ──
    const shineAngle = elapsed * 1.1 + (p/7)*Math.PI*2;
    const shineX = px + Math.cos(shineAngle) * rSize * 0.18;
    const shineY = py + Math.sin(shineAngle) * rSize * 0.18;
    const shineA = (0.35 + Math.abs(Math.sin(elapsed*1.4 + p))*0.45) * prog;
    ctx.save();
    const sg = ctx.createRadialGradient(shineX, shineY, 0, shineX, shineY, rSize*0.22);
    sg.addColorStop(0,   `rgba(255,255,255,${shineA})`);
    sg.addColorStop(0.5, `rgba(200,230,255,${shineA*0.4})`);
    sg.addColorStop(1,   'rgba(160,200,255,0)');
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.arc(shineX, shineY, rSize*0.22, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // ── Mid petals with shine ──
  for (let p = 0; p < 6; p++) {
    const angle = (p/6)*Math.PI*2 + t*0.25 + 0.3;
    const px    = x + Math.cos(angle)*rSize*0.52;
    const py    = y + Math.sin(angle)*rSize*0.52;
    const mg = ctx.createRadialGradient(px, py, 0, px, py, rSize*0.5);
    mg.addColorStop(0,   `rgba(200,225,255,${0.95*prog})`);
    mg.addColorStop(0.5, `rgba(80,130,255,${0.9*prog})`);
    mg.addColorStop(1,   `rgba(30,70,220,${0.75*prog})`);
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(px, py, rSize*0.38, rSize*0.55, angle+Math.PI/2, 0, Math.PI*2);
    ctx.fillStyle=mg; ctx.shadowColor='#88aaff'; ctx.shadowBlur=14; ctx.fill();
    ctx.restore();

    // Mid petal shine
    const mShineA = (0.25 + Math.abs(Math.sin(elapsed*1.2 + p*0.8))*0.35) * prog;
    const msx = px + Math.cos(angle) * rSize * 0.10;
    const msy = py + Math.sin(angle) * rSize * 0.10;
    ctx.save();
    const msg2 = ctx.createRadialGradient(msx, msy, 0, msx, msy, rSize*0.16);
    msg2.addColorStop(0,   `rgba(255,255,255,${mShineA})`);
    msg2.addColorStop(1,   'rgba(200,220,255,0)');
    ctx.fillStyle=msg2;
    ctx.beginPath(); ctx.arc(msx, msy, rSize*0.16, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ── Inner petals ──
  for (let p = 0; p < 5; p++) {
    const angle = (p/5)*Math.PI*2 + t*0.25 + 0.6;
    const px    = x + Math.cos(angle)*rSize*0.25;
    const py    = y + Math.sin(angle)*rSize*0.25;
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(px, py, rSize*0.22, rSize*0.36, angle+Math.PI/2, 0, Math.PI*2);
    ctx.fillStyle=`rgba(190,215,255,${0.9*prog})`; ctx.shadowColor='#aaccff'; ctx.shadowBlur=10; ctx.fill();
    ctx.restore();
  }

  // ── Glowing center — breathes ──
  const centerPulse = 1 + Math.sin(elapsed*2.2)*0.15;
  ctx.save();
  const cg = ctx.createRadialGradient(x, y, 0, x, y, rSize*0.30*prog*centerPulse);
  cg.addColorStop(0,   `rgba(255,255,255,${prog})`);
  cg.addColorStop(0.3, `rgba(180,210,255,${0.9*prog})`);
  cg.addColorStop(1,   `rgba(60,100,255,0)`);
  ctx.fillStyle=cg; ctx.shadowColor='#ffffff'; ctx.shadowBlur=28;
  ctx.beginPath(); ctx.arc(x, y, rSize*0.30*prog*centerPulse, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── Ambient floating glow particles ──
const glowPts = Array.from({length:22}, () => ({
  x:0, y:0, vy:0, vx:0, alpha:0, r:0, phase:0
}));
let glowInit = false;
function drawGlowParticles(elapsed, W, H) {
  if (!glowInit) {
    glowPts.forEach(g => {
      g.x     = W*0.2 + Math.random()*W*0.6;
      g.y     = H*0.4 + Math.random()*H*0.5;
      g.vy    = -(0.2+Math.random()*0.5);
      g.vx    = (Math.random()-0.5)*0.3;
      g.alpha = 0.3+Math.random()*0.5;
      g.r     = 1.5+Math.random()*2.5;
      g.phase = Math.random()*Math.PI*2;
    });
    glowInit = true;
  }
  glowPts.forEach(g => {
    g.y += g.vy; g.x += g.vx; g.phase += 0.04;
    if (g.y < H*0.1) { g.y=H*0.9; g.x=W*0.2+Math.random()*W*0.6; }
    const a = g.alpha * (0.4+Math.abs(Math.sin(g.phase))*0.6);
    flowerCtx.save();
    flowerCtx.globalAlpha = a * 0.7;
    flowerCtx.fillStyle   = '#88aaff';
    flowerCtx.shadowColor = '#6688ff';
    flowerCtx.shadowBlur  = 10;
    flowerCtx.beginPath();
    flowerCtx.arc(g.x, g.y, g.r, 0, Math.PI*2);
    flowerCtx.fill();
    flowerCtx.restore();
  });
}

function easeOutCubic(t){ return 1 - Math.pow(1-t, 3); }
function easeOutBack(t){
  const c1=1.70158, c3=c1+1;
  return 1 + c3*Math.pow(t-1,3) + c1*Math.pow(t-1,2);
}
