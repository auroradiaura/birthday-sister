<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 23rd Birthday Sister</title>
<style>
body{
  margin:0;
  background:#000;
  overflow:hidden;
  font-family:Arial, sans-serif;
  text-align:center;
  color:white;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:1;
}

#count{
  position:absolute;
  top:40%;
  width:100%;
  font-size:80px;
  font-weight:bold;
  z-index:2;
}

#message{
  position:absolute;
  top:15%;
  width:90%;
  max-width:600px;
  left:50%;
  transform:translateX(-50%);
  font-size:36px;
  display:none;
  color:white;
  text-shadow:0 0 20px #fff;
  font-weight:bold;
  line-height:1.4;
  z-index:2;
}

#typing{
  font-size:18px;
  color:#ffd1dc;
  display:block;
  margin-top:20px;
  line-height:1.6;
  max-width:100%;
  word-wrap: break-word;
  text-align:center;
  z-index:2;
}
</style>
</head>
<body>

<div id="count">1</div>
<div id="message">
  Happy 23rd Birthday Sister ❤️
  <br><br>
  <span id="typing"></span>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ------------------------ Countdown ------------------------
let count = 1;
const countDiv = document.getElementById("count");
let timer = setInterval(()=>{
  count++;
  countDiv.innerText = count;
  if(count>3){
    clearInterval(timer);
    countDiv.style.display="none";
    showBirthday();
  }
},1000);

// ------------------------ Heart-shaped "I love you" particles ------------------------
let heartParticles = [];
let heartVisible=false;

function heart(t){
  return {
    x:16*Math.pow(Math.sin(t),3),
    y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
  };
}

function initHeartParticles(){
  heartParticles=[];
  for(let i=0;i<400;i++){
    let angle=Math.random()*Math.PI*2;
    let size = 8 + Math.random()*12;
    heartParticles.push({
      angle:angle,
      speed:0.002 + Math.random()*0.004,
      size:size,
      offsetX:Math.random()*6-3,
      offsetY:Math.random()*6-3
    });
  }
}

function drawHeartParticles(){
  if(!heartVisible) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  heartParticles.forEach(p=>{
    p.angle += p.speed;
    let pos=heart(p.angle);
    let x=canvas.width/2 + pos.x*18 + p.offsetX;
    let y=canvas.height/2 + pos.y*18 + p.offsetY;
    ctx.fillStyle="red";
    ctx.font=p.size+"px Arial";
    ctx.fillText("I love you",x,y);
  });

  drawConfetti();

  requestAnimationFrame(drawHeartParticles);
}

// ------------------------ Confetti ------------------------
let confettiParticles=[];
function createConfetti(){
  for(let i=0;i<150;i++){
    confettiParticles.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height - canvas.height,
      r: Math.random()*6 + 4,
      d: Math.random()*10 + 2,
      color: `hsl(${Math.random()*360},100%,50%)`,
      tilt: Math.random()*10 - 5
    });
  }
}

function drawConfetti(){
  confettiParticles.forEach(p=>{
    ctx.beginPath();
    ctx.fillStyle = p.color;
    ctx.moveTo(p.x + p.tilt, p.y);
    ctx.lineTo(p.x + p.tilt + p.r/2, p.y + p.r);
    ctx.lineTo(p.x + p.tilt - p.r/2, p.y + p.r);
    ctx.closePath();
    ctx.fill();
    p.y += 2;
    p.x += Math.sin(p.y*0.05);
    if(p.y>canvas.height){p.y=-10; p.x=Math.random()*canvas.width;}
  });
}

// ------------------------ Typing personal message ------------------------
const text="Thank you for always being there for me.\nYou are not just my sister, you are my best friend.\nMost of my favorite memories have you in them. You have made my life brighter, happier and full of love and I will be forever grateful.\nHappy 23rd Birthday ❤️";
let i=0;
const typingDiv=document.getElementById("typing");
function typeMessage(){
  if(i<text.length){
    typingDiv.innerHTML += text.charAt(i)==="\n"? "<br>":text.charAt(i);
    i++;
    setTimeout(typeMessage,40);
  }
}

// ------------------------ Show everything ------------------------
function showBirthday(){
  document.getElementById("message").style.display="block";
  heartVisible=true;
  initHeartParticles();
  createConfetti();
  drawHeartParticles();
  typeMessage();
}
</script>

</body>
  </html>
