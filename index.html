<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 23rd Birthday Sister</title>

<style>

body{
margin:0;
background:#000;
overflow:hidden;
font-family:Arial;
text-align:center;
color:white;
}

canvas{
position:absolute;
top:0;
left:0;
}

#count{
position:absolute;
top:40%;
width:100%;
font-size:80px;
font-weight:bold;
}

#message{
position:absolute;
top:15%;
width:100%;
font-size:30px;
display:none;
color:#ff4d6d;
text-shadow:0 0 20px #ff4d6d;
}

#typing{
font-size:18px;
color:#ffd1dc;
display:block;
margin-top:20px;
line-height:1.6;
max-width:90%;
margin-left:auto;
margin-right:auto;
}

#cake{
position:absolute;
bottom:12%;
width:100%;
font-size:90px;
display:none;
}

</style>
</head>

<body>

<div id="count">1</div>

<div id="message">
Happy 23rd Birthday Sister ❤️
<br><br>
<span id="typing"></span>
</div>

<div id="cake">🎂</div>

<canvas id="canvas"></canvas>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function heart(t){
return{
x:16*Math.pow(Math.sin(t),3),
y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
};
}

for(let i=0;i<180;i++){

let t=Math.random()*Math.PI*2;

particles.push({
angle:t,
speed:0.01+Math.random()*0.02,
size:12+Math.random()*10
});

}

function drawHeart(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

p.angle+=p.speed;

let pos=heart(p.angle);

let x=canvas.width/2+pos.x*16;
let y=canvas.height/2+pos.y*16;

ctx.fillStyle="red";
ctx.font=p.size+"px Arial";
ctx.fillText("I love you",x,y);

});

requestAnimationFrame(drawHeart);

}

drawHeart();



function confettiBurst(){

for(let i=0;i<150;i++){

let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height;

ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)";

ctx.fillRect(x,y,6,6);

}

}

setInterval(confettiBurst,700);



document.addEventListener("click",()=>{

confettiBurst();

});



const text=
"Thank you for always being there for me.\nYou are not just my sister, you are my best friend.\nHappy 23rd Birthday ❤️";

let i=0;

function typeMessage(){

if(i<text.length){

document.getElementById("typing").innerHTML+=
text.charAt(i)==="\n"?"<br>":text.charAt(i);

i++;

setTimeout(typeMessage,40);

}

}



let n=1;

let timer=setInterval(()=>{

n++;

document.getElementById("count").innerText=n;

if(n===3){

setTimeout(()=>{

document.getElementById("count").style.display="none";
document.getElementById("message").style.display="block";
document.getElementById("cake").style.display="block";

typeMessage();

},1200);

clearInterval(timer);

}

},1000);

</script>

</body>
  </html>
